name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            builder_args: --win
            files: |
              release/*.exe
              release/*.blockmap
              release/*.yml
          - name: macOS
            os: macos-latest
            builder_args: --mac
            files: |
              release/*.dmg
          - name: Linux
            os: ubuntu-latest
            builder_args: --linux
            files: |
              release/*.AppImage
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: npm
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Package app
      run: |
        npm run build
        npx electron-builder ${{ matrix.builder_args }} --publish never
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
    
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: gitloom-${{ matrix.name }}
        path: ${{ matrix.files }}
        if-no-files-found: error

    - name: Publish GitHub release assets
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        fail_on_unmatched_files: true
        files: ${{ matrix.files }}
